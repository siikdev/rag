version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: whatisrag-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # Neo4j는 Stage 5 (Graph RAG) 에서 활성화
  # neo4j:
  #   image: neo4j:5
  #   container_name: whatisrag-neo4j
  #   ports:
  #     - "7474:7474"   # HTTP (Browser)
  #     - "7687:7687"   # Bolt
  #   volumes:
  #     - neo4j_data:/data
  #   environment:
  #     NEO4J_AUTH: neo4j/password
  #   restart: unless-stopped

volumes:
  qdrant_data:
  # neo4j_data:
